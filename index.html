<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Estaciones Porteñas · Piazzollamente</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;0,400;0,600;0,700;1,200;1,300;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0806;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Montserrat', sans-serif;
    }

    /* ── FLYER CONTAINER ── */
    .flyer {
      position: relative;
      width: 600px;
      height: 900px;
      overflow: hidden;
      background: #0e0b08;
    }

    /* ── PHOTO ── */
    .photo {
      position: absolute;
      inset: 0;
      background: url('imagen.jpeg') center top / cover no-repeat;
      filter: brightness(0.55) contrast(1.1);
    }

    /* ── GRADIENT OVERLAYS ── */
    .overlay-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 65%;
      background: linear-gradient(to top,
        #0e0b08 0%,
        #0e0b08 25%,
        rgba(14,11,8,0.92) 45%,
        rgba(14,11,8,0.5) 65%,
        transparent 100%);
    }
    .overlay-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 30%;
      background: linear-gradient(to bottom, rgba(14,11,8,0.6), transparent);
    }
    .overlay-sides {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(14,11,8,0.5) 100%);
    }

    /* ── SMOKE CANVAS ── */
    canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    /* ── TOP PRESENTER ── */
    .presenter {
      position: absolute;
      top: 36px;
      left: 0; right: 0;
      text-align: center;
      z-index: 10;
    }
    .presenter-name {
      font-size: 13px;
      letter-spacing: 0.45em;
      color: rgba(201,169,110,0.9);
      text-transform: uppercase;
      font-weight: 300;
    }
    .presenter-sub {
      font-size: 10px;
      letter-spacing: 0.6em;
      color: rgba(245,237,224,0.4);
      text-transform: uppercase;
      font-weight: 200;
      margin-top: 4px;
    }

    /* ── NUMBER 4 WITH FLAUTA ── */
    .number-4 {
      position: absolute;
      top: 60px;
      left: 28px;
      z-index: 8;
      width: 180px;
      height: 320px;
    }

    /* SVG 4 where the vertical stroke is the flute */
    .number-4 svg {
      width: 100%;
      height: 100%;
      opacity: 0.22;
      filter: drop-shadow(0 0 20px rgba(201,169,110,0.3));
    }

    /* ── TITLE BLOCK ── */
    .title-block {
      position: absolute;
      bottom: 220px;
      left: 0; right: 0;
      text-align: center;
      z-index: 10;
      padding: 0 32px;
    }

    .title-estaciones {
      font-family: 'Cormorant Garamond', serif;
      font-size: 88px;
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 0.9;
      color: #f5ede0;
      text-transform: uppercase;
      text-shadow: 0 0 60px rgba(201,169,110,0.2);
    }

    .title-portenas {
      font-family: 'Cormorant Garamond', serif;
      font-size: 68px;
      font-weight: 200;
      font-style: italic;
      letter-spacing: 0.1em;
      color: #c9a96e;
      line-height: 1;
      text-shadow: 0 0 40px rgba(201,169,110,0.3);
    }

    /* ── DIVIDER ── */
    .divider {
      position: absolute;
      bottom: 210px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,169,110,0.6), transparent);
      z-index: 10;
    }

    /* ── INFO BLOCK ── */
    .info-block {
      position: absolute;
      bottom: 44px;
      left: 36px; right: 36px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .info-date {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #f5ede0;
    }

    .info-dot { color: rgba(201,169,110,0.7); margin: 0 8px; }

    .info-venue {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(245,237,224,0.55);
      margin-top: 6px;
    }

    .info-tickets {
      margin-top: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .tickets-label {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(201,169,110,0.7);
    }

    .tickets-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      color: #f5ede0;
    }

    .tickets-price sup {
      font-size: 14px;
      font-family: 'Montserrat', sans-serif;
      color: #c9a96e;
      vertical-align: super;
    }

    .info-line {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, rgba(201,169,110,0.35), transparent);
      margin-bottom: 14px;
    }

    /* ── RED ACCENT LINE ── */
    .red-accent {
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, #b5352a 30%, #b5352a 70%, transparent);
      z-index: 10;
      opacity: 0.7;
    }

    /* ── BORDER FRAME ── */
    .frame {
      position: absolute;
      inset: 16px;
      border: 1px solid rgba(201,169,110,0.08);
      pointer-events: none;
      z-index: 11;
    }
    .frame::before {
      content: '';
      position: absolute;
      top: -1px; left: 20px; right: 20px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,169,110,0.3), transparent);
    }
    .frame::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 20px; right: 20px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,169,110,0.3), transparent);
    }

    /* ── CORNER ORNAMENTS ── */
    .corner {
      position: absolute;
      width: 20px; height: 20px;
      z-index: 12;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: rgba(201,169,110,0.5);
    }
    .corner::before { width: 100%; height: 1px; top: 0; left: 0; }
    .corner::after  { width: 1px; height: 100%; top: 0; left: 0; }
    .corner.tl { top: 24px; left: 24px; }
    .corner.tr { top: 24px; right: 24px; transform: scaleX(-1); }
    .corner.bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
    .corner.br { bottom: 24px; right: 24px; transform: scale(-1); }

  </style>
</head>
<body>

<div class="flyer">

  <!-- PHOTO -->
  <div class="photo"></div>

  <!-- OVERLAYS -->
  <div class="overlay-bottom"></div>
  <div class="overlay-top"></div>
  <div class="overlay-sides"></div>

  <!-- SMOKE CANVAS -->
  <canvas id="smokeCanvas" width="600" height="900"></canvas>

  <!-- RED ACCENT -->
  <div class="red-accent"></div>

  <!-- FRAME -->
  <div class="frame"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- PRESENTER -->
  <div class="presenter">
    <div class="presenter-name">Piazzollamente</div>
    <div class="presenter-sub">presenta</div>
  </div>

  <!-- NUMBER 4 WITH FLUTE AS VERTICAL STROKE -->
  <div class="number-4">
    <svg viewBox="0 0 160 300" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Diagonal arm of 4 -->
      <path d="M120 10 L20 190" stroke="#c9a96e" stroke-width="3" stroke-linecap="round"/>
      <!-- Horizontal bar of 4 -->
      <path d="M10 190 L155 190" stroke="#c9a96e" stroke-width="3" stroke-linecap="round"/>
      <!-- FLAUTA as vertical stroke of 4 -->
      <!-- Flute body - thin cylinder -->
      <rect x="112" y="8" width="10" height="285" rx="5" fill="url(#fluteGrad)"/>
      <!-- Flute keys/holes -->
      <ellipse cx="117" cy="60"  rx="4" ry="3" fill="rgba(180,150,80,0.6)"/>
      <ellipse cx="117" cy="85"  rx="4" ry="3" fill="rgba(180,150,80,0.6)"/>
      <ellipse cx="117" cy="110" rx="4" ry="3" fill="rgba(180,150,80,0.6)"/>
      <ellipse cx="117" cy="135" rx="4" ry="3" fill="rgba(180,150,80,0.6)"/>
      <ellipse cx="117" cy="160" rx="4" ry="3" fill="rgba(180,150,80,0.6)"/>
      <ellipse cx="117" cy="185" rx="4" ry="3" fill="rgba(180,150,80,0.6)"/>
      <ellipse cx="117" cy="210" rx="3" ry="2.5" fill="rgba(180,150,80,0.5)"/>
      <ellipse cx="117" cy="230" rx="3" ry="2.5" fill="rgba(180,150,80,0.5)"/>
      <!-- Flute end cap -->
      <ellipse cx="117" cy="12" rx="6" ry="5" fill="rgba(201,169,110,0.8)"/>
      <ellipse cx="117" cy="290" rx="4" ry="4" fill="rgba(201,169,110,0.6)"/>
      <!-- Key mechanism details -->
      <rect x="108" y="55"  width="18" height="2" rx="1" fill="rgba(201,169,110,0.3)"/>
      <rect x="108" y="80"  width="18" height="2" rx="1" fill="rgba(201,169,110,0.3)"/>
      <rect x="108" y="105" width="18" height="2" rx="1" fill="rgba(201,169,110,0.3)"/>
      <rect x="108" y="130" width="18" height="2" rx="1" fill="rgba(201,169,110,0.3)"/>
      <rect x="108" y="155" width="18" height="2" rx="1" fill="rgba(201,169,110,0.3)"/>
      <defs>
        <linearGradient id="fluteGrad" x1="112" y1="0" x2="122" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#8a6a30"/>
          <stop offset="30%"  stop-color="#e8c98a"/>
          <stop offset="60%"  stop-color="#c9a96e"/>
          <stop offset="100%" stop-color="#6a4e20"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <!-- TITLE -->
  <div class="title-block">
    <div class="title-estaciones">Estaciones</div>
    <div class="title-portenas">Porteñas</div>
  </div>

  <div class="divider"></div>

  <!-- INFO -->
  <div class="info-block">
    <div class="info-line"></div>
    <div class="info-date">
      Sábado 15 de Agosto<span class="info-dot">·</span>20:00 hs
    </div>
    <div class="info-venue">Mesón Nerudiano · Santiago</div>
    <div class="info-tickets">
      <span class="tickets-label">Entradas · portaltickets</span>
      <span class="tickets-price"><sup>$</sup>10.000</span>
    </div>
  </div>

</div>

<script>
const canvas = document.getElementById('smokeCanvas');
const ctx = canvas.getContext('2d');
const W = 600, H = 900;

// Smoke particle system
class SmokeParticle {
  constructor() { this.reset(); }
  reset() {
    // Emit from flute tip area (top right of flute) and bottom
    const side = Math.random();
    if (side < 0.5) {
      // From flute tip
      this.x = 117 + (Math.random() - 0.5) * 20;
      this.y = 80 + Math.random() * 100;
    } else {
      // From bottom ambient
      this.x = Math.random() * W;
      this.y = H + 20;
    }
    this.vx = (Math.random() - 0.5) * 0.6;
    this.vy = -(Math.random() * 1.2 + 0.3);
    this.life = 0;
    this.maxLife = 180 + Math.random() * 200;
    this.size = 30 + Math.random() * 80;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.008;
    // Color: gold smoke or reddish
    this.isGold = Math.random() > 0.35;
  }
  update() {
    this.life++;
    this.x += this.vx + Math.sin(this.life * 0.02) * 0.4;
    this.y += this.vy;
    this.vx += (Math.random() - 0.5) * 0.04;
    this.rotation += this.rotSpeed;
    this.size += 0.3;
    if (this.life >= this.maxLife || this.y < -100) this.reset();
  }
  draw(ctx) {
    const alpha = Math.sin((this.life / this.maxLife) * Math.PI) * 0.18;
    if (alpha <= 0) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
    if (this.isGold) {
      grad.addColorStop(0, `rgba(201,169,110,${alpha})`);
      grad.addColorStop(0.5, `rgba(180,140,80,${alpha * 0.5})`);
    } else {
      grad.addColorStop(0, `rgba(181,53,42,${alpha * 0.7})`);
      grad.addColorStop(0.5, `rgba(150,40,30,${alpha * 0.3})`);
    }
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, this.size, this.size * 1.4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// Wispy tendrils
class Tendril {
  constructor() { this.reset(); }
  reset() {
    this.points = [];
    this.x = 100 + Math.random() * 400;
    this.y = H;
    this.age = 0;
    this.maxAge = 300 + Math.random() * 200;
    this.speed = 0.8 + Math.random() * 0.5;
    this.wobble = Math.random() * 0.05;
    this.offset = Math.random() * 100;
    this.alpha = 0.06 + Math.random() * 0.08;
    this.width = 1 + Math.random() * 2;
    this.isGold = Math.random() > 0.4;
  }
  update() {
    this.age++;
    const nx = this.x + Math.sin(this.age * this.wobble + this.offset) * 2;
    const ny = this.y - this.speed;
    this.points.push({ x: nx, y: ny });
    this.x = nx;
    this.y = ny;
    if (this.points.length > 80) this.points.shift();
    if (this.age >= this.maxAge || this.y < -50) this.reset();
  }
  draw(ctx) {
    if (this.points.length < 2) return;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(this.points[0].x, this.points[0].y);
    for (let i = 1; i < this.points.length; i++) {
      ctx.lineTo(this.points[i].x, this.points[i].y);
    }
    const lifeRatio = this.age / this.maxAge;
    const a = Math.sin(lifeRatio * Math.PI) * this.alpha;
    ctx.strokeStyle = this.isGold
      ? `rgba(201,169,110,${a})`
      : `rgba(181,53,42,${a * 0.6})`;
    ctx.lineWidth = this.width * (1 - lifeRatio * 0.5);
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.restore();
  }
}

// Init particles
const particles = Array.from({ length: 60 }, () => {
  const p = new SmokeParticle();
  p.life = Math.random() * p.maxLife; // stagger starts
  return p;
});

const tendrils = Array.from({ length: 12 }, () => {
  const t = new Tendril();
  t.age = Math.random() * t.maxAge;
  return t;
});

function animate() {
  ctx.clearRect(0, 0, W, H);

  // Draw tendrils first (behind particles)
  tendrils.forEach(t => { t.update(); t.draw(ctx); });

  // Draw smoke particles
  particles.forEach(p => { p.update(); p.draw(ctx); });

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
